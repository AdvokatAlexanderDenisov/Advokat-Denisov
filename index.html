<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:Georgia,serif;
color:#fff;
}

.wrapper{
max-width:1500px;
margin:15px auto;
padding:10px;
border:3px solid #d4af37;
position:relative;
background:#050505;
}

.wrapper:before{
content:"";
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:1px solid #d4af37;
pointer-events:none;
}

/* HERO */

.hero{
position:relative;
min-height:430px;
overflow:hidden;
border-bottom:1px solid #d4af37;
display:flex;
align-items:center;
justify-content:center;
padding:40px 60px;
background:#050505;
}

.hero:after{
content:"";
position:absolute;
top:0;
right:0;
width:48%;
height:100%;
background:url("images/columns.png") right center no-repeat;
background-size:cover;
opacity:.35;
pointer-events:none;
}

.hero-logo{
position:absolute;
left:40px;
top:50%;
transform:translateY(-50%);
z-index:2;
}

.hero-logo img{
width:360px;
background:transparent;
mix-blend-mode:screen;
filter:drop-shadow(0 0 18px rgba(212,175,55,.5));
}

.hero-content{
position:relative;
z-index:3;
text-align:center;
max-width:900px;
}

.title{
font-size:110px;
font-weight:bold;
color:#d4af37;
line-height:1;
}

.name{
font-size:54px;
margin-top:10px;
}

.address{
font-size:24px;
margin-top:15px;
}

.phone{
font-size:82px;
font-weight:bold;
color:#d4af37;
margin-top:25px;
}

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 42px;
background:linear-gradient(#f4d16e,#d4af37);
color:#000;
font-size:30px;
font-weight:bold;
text-decoration:none;
border-radius:10px;
border:1px solid #f8de88;
box-shadow:0 0 12px rgba(212,175,55,.35);
}

/* SECTION */

.section-title{
text-align:center;
font-size:72px;
color:#d4af37;
margin:30px 0;
}

/* SERVICES */

.services{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
padding-bottom:15px;
}

.service{
border:2px solid #d4af37;
background:#050505;
min-height:240px;
padding:25px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:24px;
line-height:1.4;
}

/* BOTTOM */

.bottom{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:10px;
}

.box{
border:2px solid #d4af37;
padding:25px;
position:relative;
overflow:hidden;
min-height:420px;
background:#050505;
}

.box h2{
font-size:58px;
text-align:center;
color:#d4af37;
margin-bottom:25px;
}

/* ABOUT */

.about{
display:flex;
gap:25px;
}

.about img{
width:180px;
height:180px;
object-fit:contain;
background:transparent;
mix-blend-mode:screen;
}

.about-text{
font-size:30px;
line-height:1.7;
}

/* CONTACTS */

.contacts{
position:relative;
min-height:320px;
padding-right:300px;
}

.contacts:after{
content:"";
position:absolute;
right:0;
bottom:0;
width:280px;
height:100%;
background:url("images/themis.png") bottom right no-repeat;
background-size:contain;
mix-blend-mode:screen;
opacity:.95;
}

.contacts-text{
font-size:30px;
line-height:2;
position:relative;
z-index:2;
}

.contacts-text a{
color:#fff;
text-decoration:none;
}

footer{
margin-top:15px;
padding:20px;
text-align:center;
font-size:30px;
color:#d4af37;
border-top:1px solid #d4af37;
background:#050505;
}

</style>
